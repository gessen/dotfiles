# Fonts
font_family Cascadia Mono
font_size 20.0
disable_ligatures always
symbol_map U+e000-U+e00a Symbols Nerd Font Mono
symbol_map U+ea60-U+ebeb Symbols Nerd Font Mono
symbol_map U+e0a0-U+e0c8 Symbols Nerd Font Mono
symbol_map U+e0ca Symbols Nerd Font Mono
symbol_map U+e0cc-U+e0d7 Symbols Nerd Font Mono
symbol_map U+e200-U+e2a9 Symbols Nerd Font Mono
symbol_map U+e300-U+e3e3 Symbols Nerd Font Mono
symbol_map U+e5fa-U+e6b1 Symbols Nerd Font Mono
symbol_map U+e700-U+e7c5 Symbols Nerd Font Mono
symbol_map U+ed00-U+efc1 Symbols Nerd Font Mono
symbol_map U+f000-U+f2ff Symbols Nerd Font Mono
symbol_map U+f000-U+f2e0 Symbols Nerd Font Mono
symbol_map U+f300-U+f372 Symbols Nerd Font Mono
symbol_map U+f400-U+f533 Symbols Nerd Font Mono
symbol_map U+f0001-U+f1af0 Symbols Nerd Font Mono

# Cursor customization
cursor_shape beam

# Scrollback
scrollback_lines 10000

# Mouse
copy_on_select yes
strip_trailing_spaces always
select_by_word_characters :@-./_~?&=%+#

# Window layout
remember_window_size  no
initial_window_width  110c
initial_window_height 36c
enabled_layouts Tall, Fat, Grid, Stack
window_border_width 1.0pt
window_padding_width 12 12
confirm_os_window_close 0

# Color scheme
background_opacity 1.0
#include themes/modus-vivendi.conf
include themes/tokyo-night.conf

# OS specific tweaks
macos_option_as_alt yes

# Window management
map kitty_mod+enter new_window_with_cwd
map cmd+enter       new_window_with_cwd

# Tab management
map kitty_mod+t new_tab_with_cwd
map cmd+t       new_tab_with_cwd

# Layout management
map kitty_mod+; toggle_layout stack

# Select and act on visible text
map kitty_mod+p>n kitten hints --type linenum emacsclient --tty +{line} {path}

map kitty_mod+/ launch --location=hsplit --allow-remote-control kitty +kitten kitty_search/search.py @active-kitty-window-id
