#:schema https://jj-vcs.github.io/jj/prerelease/config-schema.json

[user]
name = "Jacek Swierk"
email = "jswierk@akamai.com"

[ui]
default-command = ["log"]
diff-formatter = ":git"
diff-editor = "ediff"
diff-instructions = false
merge-editor = "ediff"
pager = "delta"
revsets-use-glob-by-default = true

[fix.tools.clang-format]
command = ["clang-format", "--assume-filename=$path"]
patterns = [
  "**/*.h",
  "**/*.hh",
  "**/*.hpp",
  "**/*.hxx",
  "**/*.c",
  "**/*.cc",
  "**/*.cpp",
  "**/*.cxx",
]

[fix.tools.fish_indent]
command = ["fish_indent"]
patterns = ["**/*.fish"]

[fix.tools.rustfmt]
command = ["rustfmt", "+nightly", "--emit", "stdout", "--edition", "2024"]
patterns = ["**/*.rs"]

[fix.tools.shfmt]
command = [
  "shfmt",
  "--indent",
  "2",
  "--binary-next-line",
  "--case-indent",
  "--space-redirects",
  "--filename=$path"
]
patterns = ["**/*.sh"]

[merge-tools.ediff]
program = "emacsclient"
diff-invocation-mode = "file-by-file"
diff-args = [
  "-c",
  "--eval",
  "(ediff-files \"$left\" \"$right\")",
]
edit-invocation-mode = "file-by-file"
edit-args = [
  "-c",
  "--eval",
  "(ediff-files \"$left\" \"$right\")",
]
merge-args = [
  "-c",
  "--eval",
  "(ediff-merge-files-with-ancestor \"$left\" \"$right\" \"$base\" nil \"$output\")",
]

[remotes.origin]
auto-track-bookmarks = "jswierk/*"

[revsets]
bookmark-advance-to = "closest_pushable(@)"

[revset-aliases]
"closest_pushable(to)" = "heads(::to & mutable() & ~description(exact:'') & (~empty() | merges()))"
"stack()" = "stack(@)"
"stack(x)" = "stack(x, 1)"
"stack(x, n)" = "ancestors(reachable(x, mutable()), n)"

[templates]
draft_commit_description = "builtin_draft_commit_description_with_diff"
git_push_bookmark = '''
  truncate_end(
    72,
    separate(
      "/",
      "jswierk",
      jira_ticket_prefix(description),
    ),
  )
'''

[template-aliases]
"format_timestamp(ts)" = "ts.ago()"
"jira_ticket_prefix(description)" = '''
  description
    .match(regex:'^\[[[:upper:]]+-[[:digit:]]+\]')
    .replace(regex:'\[([[:upper:]]+-[[:digit:]]+)\]', "$1")
'''
