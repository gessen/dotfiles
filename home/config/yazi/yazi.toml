[manager]
sort_by = "natural"
sort_sensitive = false
sort_dir_first = true
show_hidden = true

[opener]
edit = [
  { exec = '$EDITOR "$@"', block = true, for = "unix" },
  { exec = 'helix "$@"', block = true, for = "unix" },
]
play = [
  { exec = 'mpv "$@"'},
]

[open]
rules = [
  { name = "*/", use = ["open", "edit" ] },

  { mime = "text/*", use = [ "edit" ]},
  { mime = "image/*", use = [ "open" ]},
  { mime = "video/*", use = [ "play" ], orphan = true },
  { mime = "audio/*", use = [ "play" ], orphan = true },

  { mime = "application/json", use = [ "edit" ]},

  { mime = "application/gzip", use = [ "extract" ]},
  { mime = "application/zip", use = [ "extract" ]},
  { mime = "application/zstd", use = [ "extract" ]},
  { mime = "application/x-tar", use = [ "extract" ]},
  { mime = "application/x-bzip", use = [ "extract" ]},
  { mime = "application/x-bzip2", use = [ "extract" ]},
  { mime = "application/x-7z-compressed", use = [ "extract" ]},
  { mime = "application/x-rar", use = [ "extract" ]},
]
