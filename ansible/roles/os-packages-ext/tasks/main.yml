---
- name: 'Include distribution specific variables for {{ ansible_facts["distribution"] }}'
  include_vars: '{{ var_file }}'
  with_first_found:
      - files:
          - 'vars/{{ ansible_facts["distribution"] | lower }}.yml'
          - 'vars/{{ ansible_facts["os_family"] | lower }}.yml'
        skip: true
  loop_control:
    loop_var: var_file

- name: 'Include distribution specific tasks for {{ ansible_facts["distribution"] }}'
  include_tasks: '{{ task_file }}'
  with_first_found:
      - files:
          - 'tasks/{{ ansible_facts["distribution"] | lower }}.yml'
          - 'tasks/{{ ansible_facts["os_family"] | lower }}.yml'
        skip: true
  loop_control:
    loop_var: task_file
