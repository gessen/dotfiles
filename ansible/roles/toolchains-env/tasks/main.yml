---
- name: Create folders for toolchain environments files
  file:
    path: '{{ toolchains_env_dst + "/" + item }}'
    state: directory
  with_items: '{{ toolchains }}'

- name: Symlink compiler toolchain environments files
  file:
    path: '{{ toolchains_env_dst }}/{{ item[0] }}/environment-{{ item[1] }}'
    src: '{{ toolchains_env_src }}/environment-set'
    state: link
    force: yes
  with_nested:
    - '{{ toolchains }}'
    - '{{ compilers }}'

- name: Symlink additional toolchain environments files
  file:
    path: '{{ toolchains_env_dst }}/{{ item[0] }}/{{ item[1] }}'
    src: '{{ toolchains_env_src }}/{{ item[1] }}'
    state: link
    force: yes
  with_nested:
    - '{{ toolchains }}'
    - '{{ helpers }}'
